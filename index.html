<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="card">
          <img
            src="./assets/images/illustration-article.svg"
            alt="HTML & CSS Article Illustration"
            class="card-image"
          />
          <div class="card-category">Learning</div>
          <div class="card-date">Published 21 DEC 2023</div>
          <div class="card-content">
            <h1 class="card-title"><a href="#">HTML & CSS Foundations</a></h1>
            <p class="card-description">
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
            <div class="card-author">
              <img
                src="./assets/images/image-avatar.webp"
                alt="Greg Hooper Avatar"
                class="author-avatar"
              />
              <p class="author-name">Greg Hooper</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
